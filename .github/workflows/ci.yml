name: CI
# UNIQUE CODE IDENTIFIER: RP-DEASI-JUP-2026-0619-001
# Author: Richard Patterson (@De-ASI-INTERFACE)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Provide a dummy API key so API tests can construct the Express app
      # without hitting the 402 gate on every request during unit tests.
      API_KEY: ci-test-key-rp-jup-2026
      # No ALLOWED_ORIGINS set — CORS allows all in CI (dev fallback path)
      RATE_LIMIT_MAX: 1000   # prevent rate limit from interfering with test suite
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Run all tests
        run: npm run test
