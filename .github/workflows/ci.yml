name: CI
# UNIQUE CODE IDENTIFIER: RP-DEASI-JUP-2026-0619-001
# Author: Richard Patterson (@De-ASI-INTERFACE)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
